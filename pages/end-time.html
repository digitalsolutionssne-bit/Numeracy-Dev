<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>End Time | LifeCount</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="top-bar">
        <a href="time-menu.html" class="back-btn" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Back
        </a>
        <h1>End Time 🕒</h1>
        <div class="header-actions">
            <a href="../index.html" class="header-icon-btn" aria-label="Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
            <button id="theme-toggle" class="header-icon-btn" style="font-size:1.5rem;">🌗</button>
        </div>
    </header>

    <main class="page-content">
        <div class="content-body time-content">
            
            <div class="input-group">
                <label>▶️ Start Time:</label>
                <div class="time-picker-wrapper">
                    <input type="text" id="start-time-display" class="large-input time-picker-display" value="Tap to set time" readonly aria-hidden="true">
                    <input type="time" id="start-time" class="time-picker-native">
                </div>
            </div>

            <div class="input-group">
                <label>⌛ Duration (Time spent on):</label>
                <div class="time-block-container">
                    <div class="time-block"><label>Hour</label><input type="number" id="dur-hours" placeholder="0" min="0"></div>
                    <div class="time-block"><label>Minute</label><input type="number" id="dur-mins" placeholder="0" min="0" max="59"></div>
                </div>
            </div>

            <div class="time-result-box">
                <p style="margin: 0 0 0.5rem 0; font-weight:bold; font-size:1.1rem; opacity:0.8;">You will finish at ⏹️:</p>
                <h2 id="end-time-result" style="margin: 0; font-size: 2.5rem; color: var(--primary-color);">--:--</h2>
            </div>
            
        </div>

        <div class="step-footer">
            <button class="primary-btn" onclick="calculateEndTime()">Calculate End Time</button>
        </div>
    </main>

    <script src="../app.js"></script>
    <script>
        function format12Hour(time24) {
            if (!time24) return "Tap to set time";
            let[hours, minutes] = time24.split(':');
            hours = parseInt(hours, 10);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const strHours = hours < 10 ? '0' + hours : hours;
            return `${strHours}:${minutes} ${ampm}`;
        }

        document.getElementById('start-time').addEventListener('input', function(e) {
            document.getElementById('start-time-display').value = format12Hour(e.target.value);
        });

        function calculateEndTime() {
            const start = document.getElementById('start-time').value;
            const hours = parseInt(document.getElementById('dur-hours').value) || 0;
            const mins = parseInt(document.getElementById('dur-mins').value) || 0;
            if(!start) return alert("Please enter a Start Time.");

            const startD = new Date(`1970-01-01T${start}:00`);
            startD.setHours(startD.getHours() + hours);
            startD.setMinutes(startD.getMinutes() + mins);

            let hr = startD.getHours();
            let mn = startD.getMinutes();
            const ampm = hr >= 12 ? 'PM' : 'AM';
            hr = hr % 12;
            hr = hr ? hr : 12; 
            
            const strHr = hr < 10 ? '0' + hr : hr;
            mn = mn < 10 ? '0' + mn : mn;

            document.getElementById('end-time-result').innerText = `${strHr}:${mn} ${ampm}`;
        }
    </script>
</body>
</html>
