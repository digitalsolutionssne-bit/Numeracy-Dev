<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Cashier</title>
    <link rel="stylesheet" href="../styles.css">
    <!-- Include manifest for PWA -->
    <link rel="manifest" href="../manifest.json">
</head>
<body>
    <div class="test-env-banner">TEST ENVIRONMENT</div>
    
    <header>
        <button class="back-btn">&lt; Back</button>
        <h1>Pay Cashier 🤖</h1>
        <div class="header-icons">
            <span class="icon">🏠</span>
            <span class="icon">🌓</span>
        </div>
    </header>

    <main>
        <!-- Top Summary Boxes -->
        <div class="top-summary-container">
            <div id="total-cost-box" class="summary-box total-box-green">
                <span>Total Cost</span>
                <strong id="total-cost-display">$0.00</strong>
            </div>
            <div id="wallet-box" class="summary-box wallet-box-light-green">
                <span>My Wallet 💳</span>
                <strong id="wallet-total">$52.00</strong>
            </div>
        </div>

        <!-- Input Section -->
        <section class="buy-section">
            <div class="section-title">🛒 I want to buy:</div>
            
            <div id="item-list">
                <!-- Items list -->
                <div class="item-row">
                    <span class="currency-symbol">$</span>
                    <input type="number" class="item-input" value="48">
                    <button class="delete-item-btn">🗑️</button>
                </div>
                <div class="item-row">
                    <span class="currency-symbol">$</span>
                    <input type="number" class="item-input" value="4.5">
                    <button class="delete-item-btn">🗑️</button>
                </div>
                <div class="item-row">
                    <span class="currency-symbol">$</span>
                    <input type="number" class="item-input" value="1.2">
                    <button class="delete-item-btn">🗑️</button>
                </div>
                <div class="item-row">
                    <span class="currency-symbol">$</span>
                    <input type="number" class="item-input" value="0.00">
                    <button class="delete-item-btn">🗑️</button>
                </div>
            </div>

            <button id="add-item-btn" class="add-item-btn">➕ Add Another Item</button>
        </section>

        <!-- Relative container to trap the overlay to the bottom half -->
        <div id="payment-section-container">
            <div class="payment-prompt">
                Amount to pay cashier: 🤖<br>
                <span class="error-text">Cannot make exact payment</span>
            </div>
            
            <!-- Placeholder for cash selection area shown in screenshot -->
            <div class="grey-placeholder-box"></div>

            <button id="pay-cashier-btn" class="pay-btn">I have paid Cashier</button>

            <!-- NEW: Persistent Notification Overlay -->
            <div id="insufficient-funds-overlay" class="hidden">
                <div class="overlay-content">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <line x1="25" y1="25" x2="75" y2="75" stroke="#ea4335" stroke-width="10" stroke-linecap="round" />
                        <line x1="75" y1="25" x2="25" y2="75" stroke="#ea4335" stroke-width="10" stroke-linecap="round" />
                    </svg>
                    <h2 class="overlay-title-red">Not Enough Money in Wallet</h2>
                    <p class="overlay-subtext">Please remove items or lower costs to proceed 🤖</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../app.js"></script>
</body>
</html>
