<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expiration | LifeCount</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="top-bar">
        <a href="../index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg> Back
        </a>
        <h1>Expiration Date</h1>
        <button id="theme-toggle" style="background:none; border:none; font-size:1.5rem; padding: 0;">🌗</button>
    </header>

    <main class="page-content" style="padding: 1.5rem;">
        
        <div class="input-group">
            <label>Today is:</label>
            <input type="date" class="large-input" id="today-date" readonly>
        </div>

        <p style="text-align:center; font-weight:bold; margin-bottom: 10px;">Product Expiration Date:</p>
        
        <!-- Button UI Fix: SVG Icon separated from text span allowing perfect Flexbox alignment -->
        <label class="ai-scan-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <span id="scan-btn-text">Scan Date</span>
            <input type="file" accept="image/*" capture="environment" id="camera-input" style="display:none;">
        </label>
        
        <!-- Result Popups -->
        <div id="result-good" class="expiry-result expiry-good">
            <span class="icon">✅</span>
            <h2>Still good</h2>
            <p>CAN eat/use.</p>
        </div>

        <div id="result-bad" class="expiry-result expiry-bad">
            <span class="icon">❌</span>
            <h2>Expired</h2>
            <p>CANNOT eat/use.</p>
        </div>

    </main>

    <script src="../app.js"></script>
    <script>
        // Set today's date automatically
        document.getElementById('today-date').valueAsDate = new Date();

        // Simulate Scanning behavior
        document.getElementById('camera-input').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                // Hide existing popups
                document.getElementById('result-good').style.display = 'none';
                document.getElementById('result-bad').style.display = 'none';
                
                // Target the specific span for text replacement
                const textSpan = document.getElementById('scan-btn-text');
                const originalText = textSpan.innerText;
                textSpan.innerText = "Processing Scan...";
                
                setTimeout(() => {
                    textSpan.innerText = originalText;
                    
                    // Mock Logic
                    if(Math.random() > 0.5) {
                        document.getElementById('result-good').style.display = 'block';
                    } else {
                        document.getElementById('result-bad').style.display = 'block';
                    }
                }, 1500);
            }
        });
    </script>
</body>
</html>
