<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Purchasing 2 | NumPal</title>
   <link rel="stylesheet" href="../styles.css">
   <style>
       /* Specific Layout Styles for Purchasing 2 Workflow */
       .status-sidebar {
           width: 48px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
           color: white; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;
           writing-mode: vertical-rl; transform: rotate(180deg); text-transform: uppercase;
           transition: background-color 0.3s;
       }
       .status-sidebar.can-buy { background-color: var(--success-color); }
       .status-sidebar.cannot-buy { background-color: var(--error-color); }
       .status-sidebar.neutral { background-color: #9e9e9e; }
       [data-theme="dark"] .status-sidebar.neutral { background-color: #555; }
       
       .p2-header-box {
           display: flex; justify-content: space-between; align-items: center; 
           padding: 0.8rem; border-radius: 8px; border: 2px solid var(--card-border); 
           background-color: var(--card-bg); margin-bottom: 10px;
       }
       .p2-cost-row {
           display: flex; justify-content: space-between; align-items: center; 
           border-top: 2px solid var(--card-border); padding-top: 10px; margin-top: 5px;
       }
       
       /* Split Top Header for Step 3 */
       .check-money-header {
           display: flex; justify-content: space-between; align-items: center; 
           margin-bottom: 15px; padding: 0 10px;
       }
       .check-money-header > div { text-align: center; width: 48%; }
       .check-money-header p { margin: 0; font-weight: bold; font-size: 1rem; }
       .check-money-header h2 { margin: 0; font-size: 1.8rem; }
       .expected-change-col p, .expected-change-col h2 { color: var(--success-color); }
   </style>
</head>
<body>
   <header class="top-bar">
       <button class="back-btn" onclick="goBack()" aria-label="Go back">
           <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
           Back
       </button>
       <h1 id="header-title">Wallet</h1>
       <div class="header-actions">
           <a href="../index.html" class="header-icon-btn" aria-label="Home">
               <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
           </a>
           <button id="theme-toggle" class="header-icon-btn" style="font-size:1.5rem;">🌗</button>
       </div>
   </header>

   <main class="page-content">

       <!-- STEP 1: WALLET SETUP (Identical logic to Purchasing 1) -->
       <div id="step-1" class="flow-step active">
           <div class="content-body">
               <div style="text-align: center; flex-shrink: 0; margin-bottom: 5px;">
                   <p style="margin: 0; font-weight: bold; font-size: 1rem;">Total Amount 💰</p>
                   <h1 style="margin: 0; font-size: 2.2rem;">$<span id="wallet-total">0.00</span></h1>
               </div>
               <div class="wallet-grid" id="wallet-grid-container"></div>
           </div>
           <div class="step-footer">
               <button class="primary-btn" id="btn-next-step" onclick="goToStep2()">Next</button>
           </div>
       </div>

       <!-- STEP 2: VIDEO WORKFLOW LAYOUT -->
       <div id="step-2" class="flow-step">
           <div style="display: flex; height: 100%; width: 100%;">
               <!-- Dynamic Left Sidebar -->
               <div id="status-sidebar" class="status-sidebar neutral">
                   <span id="status-icon" style="transform: rotate(90deg); margin-bottom: 15px;">
                       <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                   </span>
                   <span id="status-text">ENTER COST</span>
               </div>
               
               <!-- Main Body -->
               <div style="display: flex; flex-direction: column; flex: 1; min-width: 0;">
                   <div class="content-body" style="padding-bottom: 0; gap: 6px;">
                       
                       <!-- Header box (I have / View Wallet) -->
                       <div class="p2-header-box">
                           <div>
                               <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.8;">I have</div>
                               <div style="font-size: 1.5rem; font-weight: bold;">$<span id="step2-wallet-total">0.00</span></div>
                           </div>
                           <button class="primary-btn" style="width: auto; padding: 0.5rem 1rem; margin: 0 !important; font-size: 0.9rem; background-color: var(--primary-color);" onclick="goToStep1()">VIEW WALLET</button>
                       </div>

                       <!-- Items to buy -->
                       <div class="items-container" style="flex: none; flex-shrink: 0;">
                           <label style="margin-bottom: 8px; display: block; font-weight: bold; font-size: 1.1rem;">I want to buy (cost of items)</label>
                           <div id="items-list" style="max-height: 142px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; padding-right: 4px;">
                               <div class="item-row" style="margin-bottom: 0;">
                                   <div class="currency-wrapper">
                                       <span class="currency-symbol">$</span>
                                       <input type="number" class="large-input item-cost" placeholder="0.00" step="0.01" min="0" oninput="calculateTotalCost()">
                                   </div>
                                   <button class="remove-item-btn" onclick="removeItem(this)">
                                       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                                   </button>
                               </div>
                           </div>
                           <button class="add-item-btn" onclick="addItem()" style="margin-top: 8px; padding: 0.4rem;">⊕ ADD ITEM</button>
                       </div>

                       <!-- Total Cost summary -->
                       <div class="p2-cost-row">
                           <span style="font-weight: bold; font-size: 1.1rem;">Total cost</span>
                           <span style="font-size: 2rem; font-weight: bold;">$<span id="total-cost-display">0.00</span></span>
                       </div>

                       <!-- Give Cashier graphics (Only visible if CAN BUY) -->
                       <div id="give-cashier-section" style="display: none; flex-direction: column; flex: 1; min-height: 0;">
                           <span style="font-weight: bold; font-size: 1rem; margin-bottom: 5px;">Give cashier</span>
                           <div class="payment-graphics-container" id="give-cashier-graphics" style="flex: 1; align-items: flex-start; justify-content: flex-start; padding: 5px; background: transparent; border: 1px dashed var(--card-border);">
                           </div>
                       </div>
                   </div>
                   
                   <!-- Footer for Step 2 -->
                   <div class="step-footer" id="step2-footer" style="display: none; justify-content: space-between; align-items: center; padding: 10px 1rem; background-color: var(--card-bg); border-top: 2px solid var(--card-border);">
                       <div style="display: flex; flex-direction: column;">
                           <span style="font-weight: bold; font-size: 0.9rem;">Change amount</span>
                           <span style="font-size: 1.5rem; font-weight: bold; color: var(--success-color);">$<span id="change-amount-display">0.00</span></span>
                       </div>
                       <button class="primary-btn" id="btn-check-money" style="width: auto; margin: 0 !important; background-color: var(--primary-color);" onclick="goToStep3()">CHECK MONEY</button>
                   </div>
               </div>
           </div>
       </div>

       <!-- STEP 3: CHECK MONEY (Purchasing 1 UI + Purchasing 2 Header layout) -->
       <div id="step-3" class="flow-step">
           <div class="content-body">
               <div class="check-money-header">
                   <div class="expected-change-col">
                       <p>Change Amount</p>
                       <h2>$<span id="step3-expected-change">0.00</span></h2>
                   </div>
                   <div>
                       <p>Cashier Gave</p>
                       <h2>$<span id="change-total">0.00</span></h2>
                   </div>
               </div>
               <div class="wallet-grid" id="change-grid-container"></div>
           </div>
           <div class="step-footer">
               <button class="primary-btn" id="btn-check-change" onclick="checkChange()">DONE</button>
           </div>
       </div>

   </main>

   <!-- STEP 4: BIG BOTTOM SHEET NOTIFICATION -->
   <div class="bottom-sheet-backdrop" id="sheet-backdrop"></div>
   <div class="bottom-sheet" id="result-sheet">
       <div id="sheet-content-correct" style="display:none; flex-direction: column; align-items: center;">
           <div class="giant-icon">✅</div>
           <h2>Correct Change!</h2>
           <p>You received the right amount.</p>
       </div>
       <div id="sheet-content-wrong" style="display:none; flex-direction: column; align-items: center;">
           <div class="giant-icon">❌</div>
           <h2>Wrong Change</h2>
           <p>
               Please inform the cashier
               <svg xmlns="http://www.w3.org/2000/svg" class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 18H2v-4h20v4Z"/><path d="M18 14V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v8"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><rect x="10" y="2" width="4" height="4"/></svg>
           </p>
       </div>
       <div class="sheet-btn-group" style="margin-top: 15px;">
           <button class="primary-btn" id="sheet-home-btn" onclick="window.location.href='../index.html'" style="background-color: var(--primary-color); padding:0.8rem; margin:0; display:flex; align-items:center; justify-content:center; gap:8px;">
               <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
               Main Menu
           </button>
           <button class="primary-btn" id="retry-btn" onclick="retryChange()" style="background-color: #9C27B0; color: #ffffff; border: none; padding:0.8rem; margin:0;">
               Check New Change
           </button>
       </div>
   </div>

   <script src="../app.js"></script>
   <script>
       const denominations =[
           { val: 50, img: '../assets/note-50.png', label: '$50', type: 'note' },
           { val: 10, img: '../assets/note-10.png', label: '$10', type: 'note' },
           { val: 5,  img: '../assets/note-5.png',  label: '$5',  type: 'note' },
           { val: 2,  img: '../assets/note-2.png',  label: '$2',  type: 'note' },
           { val: 1,  img: '../assets/coin-1.png',  label: '$1',  type: 'coin' },
           { val: 0.5,img: '../assets/coin-50c.png',label: '50¢', type: 'coin' },
           { val: 0.2,img: '../assets/coin-20c.png',label: '20¢', type: 'coin' },
           { val: 0.1,img: '../assets/coin-10c.png',label: '10¢', type: 'coin' },
           { val: 0.05,img: '../assets/coin-5c.png',label: '5¢',  type: 'coin' }
       ];

       let walletCounts = { 50:0, 10:0, 5:0, 2:0, 1:0, 0.5:0, 0.2:0, 0.1:0, 0.05:0 };
       let changeCounts = { 50:0, 10:0, 5:0, 2:0, 1:0, 0.5:0, 0.2:0, 0.1:0, 0.05:0 };
       let totalWallet = 0;
       let expectedChange = 0; 
       let currentStep = 1;

       const walletSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>`;
       const minusSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="4" y1="12" x2="20" y2="12"/></svg>`;
       const plusSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg>`;

       function renderGrid(containerId, countsObj, totalElemId) {
           const container = document.getElementById(containerId);
           container.innerHTML = '';
           denominations.forEach(d => {
               const item = document.createElement('div');
               item.className = 'wallet-item';
               const graphic = `<img src="${d.img}" alt="${d.label}" class="currency-img ${d.type}">`;
               item.innerHTML = `
                   ${graphic}
                   <div class="wallet-controls">
                       <button class="control-btn minus" onclick="updateCount(${d.val}, -1, '${containerId}', '${totalElemId}')">${minusSvg}</button>
                       <span class="control-count" id="count-${containerId}-${d.val}">${countsObj[d.val]}</span>
                       <button class="control-btn plus" onclick="updateCount(${d.val}, 1, '${containerId}', '${totalElemId}')">${plusSvg}</button>
                   </div>
               `;
               container.appendChild(item);
           });
       }

       function updateCount(val, delta, containerId, totalElemId) {
           let countsObj = containerId === 'wallet-grid-container' ? walletCounts : changeCounts;
           if (countsObj[val] + delta >= 0) {
               countsObj[val] += delta;
               document.getElementById(`count-${containerId}-${val}`).innerText = countsObj[val];
               recalcTotal(countsObj, totalElemId);
           }
       }

       function recalcTotal(countsObj, totalElemId) {
           let totalCents = 0;
           for (const[val, count] of Object.entries(countsObj)) {
               totalCents += Math.round(parseFloat(val) * 100) * count;
           }
           const totalDollars = (totalCents / 100).toFixed(2);
           document.getElementById(totalElemId).innerText = totalDollars;
           if (totalElemId === 'wallet-total') totalWallet = totalDollars;
       }

       renderGrid('wallet-grid-container', walletCounts, 'wallet-total');
       renderGrid('change-grid-container', changeCounts, 'change-total');

       function goBack() {
           if (currentStep === 3) goToStep2();
           else if (currentStep === 2) goToStep1();
           else window.location.href = '../index.html';
       }

       function switchStep(stepNum, titleHtml) {
           currentStep = stepNum;
           document.querySelectorAll('.flow-step').forEach(el => el.classList.remove('active'));
           document.getElementById(`step-${stepNum}`).classList.add('active');
           document.getElementById('header-title').innerHTML = titleHtml;
       }

       function goToStep1() { 
           switchStep(1, `Wallet`); 
       }

       function goToStep2() {
           if (parseFloat(totalWallet) === 0) {
               alert("Your wallet is empty! Please add money first.");
               return;
           }
           document.getElementById('step2-wallet-total').innerText = totalWallet;
           calculateTotalCost(); 
           switchStep(2, `Purchasing`);
       }

       function goToStep3() { 
           switchStep(3, "Check Money"); 
       }

       function addItem() {
           const list = document.getElementById('items-list');
           const row = document.createElement('div');
           row.className = 'item-row';
           row.style.marginBottom = '0';
           row.innerHTML = `
               <div class="currency-wrapper">
                   <span class="currency-symbol">$</span>
                   <input type="number" class="large-input item-cost" placeholder="0.00" step="0.01" min="0" oninput="calculateTotalCost()">
               </div>
               <button class="remove-item-btn" onclick="removeItem(this)">
                   <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
               </button>
           `;
           list.appendChild(row);
           row.querySelector('.item-cost').focus(); 
           list.scrollTop = list.scrollHeight;
       }

       function removeItem(btn) {
           const list = document.getElementById('items-list');
           if (list.children.length > 1) {
               btn.parentElement.remove();
               calculateTotalCost(); 
           } else {
               btn.previousElementSibling.querySelector('input').value = '';
               calculateTotalCost();
           }
       }

       function calculateTotalCost() {
           const inputs = document.querySelectorAll('.item-cost');
           let totalCostCents = 0;
           inputs.forEach(input => {
               totalCostCents += Math.round(parseFloat(input.value || 0) * 100);
           });

           const walletCents = Math.round(parseFloat(totalWallet) * 100);
           const costDisplay = document.getElementById('total-cost-display');
           costDisplay.innerText = (totalCostCents / 100).toFixed(2);

           const sidebar = document.getElementById('status-sidebar');
           const statusIcon = document.getElementById('status-icon');
           const statusText = document.getElementById('status-text');
           
           const giveCashierSection = document.getElementById('give-cashier-section');
           const graphicsContainer = document.getElementById('give-cashier-graphics');
           const step2Footer = document.getElementById('step2-footer');
           const changeAmountDisplay = document.getElementById('change-amount-display');
           const expectedChangeDisplay = document.getElementById('step3-expected-change');

           let canBuy = false;
           let bestPaymentArray =[];
           let paymentSumCents = 0;

           if (totalCostCents > 0 && totalCostCents <= walletCents) {
               bestPaymentArray = calculateOptimalPayment(totalCostCents);
               if (bestPaymentArray.length > 0) {
                   canBuy = true;
                   bestPaymentArray.forEach(val => paymentSumCents += val);
               }
           }

           if (totalCostCents === 0) {
               sidebar.className = 'status-sidebar neutral';
               statusIcon.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>`;
               statusIcon.style.transform = 'rotate(90deg)';
               statusText.innerText = 'ENTER COST';
               giveCashierSection.style.display = 'none';
               step2Footer.style.display = 'none';
               return;
           }

           if (canBuy) {
               sidebar.className = 'status-sidebar can-buy';
               statusIcon.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 6L9 17l-5-5"></path></svg>`;
               statusIcon.style.transform = 'rotate(90deg)';
               statusText.innerText = 'CAN BUY';
               
               graphicsContainer.innerHTML = '';
               bestPaymentArray.forEach(valCents => {
                   const d = denominations.find(denom => Math.round(denom.val * 100) === valCents);
                   graphicsContainer.innerHTML += `<img src="${d.img}" alt="${d.label}" class="payment-img ${d.type}">`;
               });

               expectedChange = paymentSumCents - totalCostCents;
               const changeDollars = (expectedChange / 100).toFixed(2);
               changeAmountDisplay.innerText = changeDollars;
               expectedChangeDisplay.innerText = changeDollars;
               
               giveCashierSection.style.display = 'flex';
               step2Footer.style.display = 'flex';
           } else {
               sidebar.className = 'status-sidebar cannot-buy';
               statusIcon.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
               statusIcon.style.transform = 'rotate(90deg)';
               statusText.innerText = 'CANNOT BUY';
               
               giveCashierSection.style.display = 'none';
               step2Footer.style.display = 'none';
           }
       }

       function calculateOptimalPayment(costCents) {
           let inventory =[];
           denominations.forEach(d => {
               let valCents = Math.round(d.val * 100);
               for (let i = 0; i < walletCounts[d.val]; i++) inventory.push(valCents);
           });
           inventory.sort((a,b) => b - a);

           let bestSum = Infinity;
           let bestSubset =[];

           function dfs(index, currentSubset, currentSum) {
               if (currentSum >= costCents) {
                   if (currentSum < bestSum || (currentSum === bestSum && currentSubset.length < bestSubset.length)) {
                       bestSum = currentSum; bestSubset =[...currentSubset];
                   }
                   return;
               }
               if (index >= inventory.length) return;
               currentSubset.push(inventory[index]);
               dfs(index + 1, currentSubset, currentSum + inventory[index]);
               currentSubset.pop();
               dfs(index + 1, currentSubset, currentSum);
           }

           if (inventory.length <= 22) {
               dfs(0,[], 0);
           } else {
               let sum = 0;
               for (let v of inventory) {
                   bestSubset.push(v);
                   sum += v;
                   if (sum >= costCents) break;
               }
           }
           return bestSubset;
       }

       function checkChange() {
           let actualChangeCents = 0;
           for (const[val, count] of Object.entries(changeCounts)) {
               actualChangeCents += Math.round(parseFloat(val) * 100) * count;
           }

           const isCorrect = actualChangeCents === expectedChange;
           document.getElementById('sheet-backdrop').classList.add('show');
           const sheet = document.getElementById('result-sheet');
           
           document.getElementById('sheet-content-correct').style.display = isCorrect ? 'flex' : 'none';
           document.getElementById('sheet-content-wrong').style.display = isCorrect ? 'none' : 'flex';
           
           if (isCorrect) {
               document.getElementById('sheet-home-btn').style.display = 'flex';
               document.getElementById('retry-btn').style.display = 'none';
           } else {
               document.getElementById('sheet-home-btn').style.display = 'none';
               document.getElementById('retry-btn').style.display = 'block';
           }
           
           sheet.classList.remove('correct', 'wrong');
           sheet.classList.add(isCorrect ? 'correct' : 'wrong');
           sheet.classList.add('show');
       }

       function retryChange() {
           document.getElementById('sheet-backdrop').classList.remove('show');
           document.getElementById('result-sheet').classList.remove('show');
           changeCounts = { 50:0, 10:0, 5:0, 2:0, 1:0, 0.5:0, 0.2:0, 0.1:0, 0.05:0 };
           renderGrid('change-grid-container', changeCounts, 'change-total');
       }
   </script>
</body>
</html>
