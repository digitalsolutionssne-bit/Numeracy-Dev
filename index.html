<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeCount</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-bar">
        <button id="force-update-btn" aria-label="Force Update App" style="background:none; border:none; padding: 0; cursor: pointer; color: var(--primary-color); display: flex; align-items: center;">
            <svg class="update-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                <path d="M21 3v5h-5"></path>
            </svg>
        </button>
        
        <h1>LifeCount</h1>
        
        <button id="theme-toggle" aria-label="Toggle Dark Mode" style="background:none; border:none; font-size:1.5rem; padding: 0; cursor: pointer;">🌗</button>
    </header>

    <main class="menu-container">
        <!-- KEEP YOUR CUSTOM ICONS HERE -->
        <a href="pages/purchasing.html" class="menu-card money-card">
            <span class="icon">🛒</span>
            <h2>Purchasing</h2>
        </a>
        <a href="pages/time-menu.html" class="menu-card time-card">
            <span class="icon">⌚</span>
            <h2>Time</h2>
        </a>
        <a href="pages/expiry.html" class="menu-card other-card">
            <span class="icon">📅</span>
            <h2>Expiration Date</h2>
        </a>
        
        <label class="menu-card other-card" style="border-left-color: #9e9e9e; cursor: pointer;">
            <span class="icon" style="filter: grayscale(100%);">📅</span>
            <h2>Scan Expiration Date</h2>
            <input type="file" accept="image/*" capture="environment" id="direct-scan-input" style="display:none;">
        </label>
    </main>

    <!-- Processing State Overlay (FOOLPROOF HIDDEN) -->
    <div id="processing-screen" class="processing-overlay" style="display: none;">
        <div class="processing-spinner">⏳</div>
        <h2 style="font-size: 2rem;">AI is checking...</h2>
    </div>

    <!-- The Big Obnoxious Overlays (FOOLPROOF HIDDEN) -->
    <div id="obnoxious-good" class="obnoxious-overlay good" style="display: none;">
        <div class="giant-icon">✅</div>
        <h1>SAFE!</h1>
        <p>You can eat/use this.</p>
        <button class="obnoxious-btn" onclick="closeOverlay()">OKAY</button>
    </div>

    <div id="obnoxious-bad" class="obnoxious-overlay bad" style="display: none;">
        <div class="giant-icon">❌</div>
        <h1>EXPIRED!</h1>
        <p>DO NOT eat/use this!</p>
        <button class="obnoxious-btn" onclick="closeOverlay()">OKAY</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
