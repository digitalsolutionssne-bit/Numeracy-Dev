<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Expiration | NumPal</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="top-bar">
      <a href="../../index.html" class="back-btn" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg> Back
      </a>
      <h1>📅 Expiration Date</h1>
      <div class="header-actions">
          <a href="../../index.html" class="header-icon-btn" aria-label="Home">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </a>
          <button id="theme-toggle" class="header-icon-btn" style="font-size:1.5rem;">🌗</button>
      </div>
  </header>

  <main class="page-content">
      <div class="content-body" style="gap: 1.5rem; justify-content: space-evenly;">
          
          <div style="text-align: center; flex-shrink: 0;">
              <p style="margin: 0; font-weight: bold; font-size: 1.2rem; opacity: 0.8;">Today is:</p>
              <h2 id="today-date-display" style="margin: 5px 0 0 0; font-size: 2.2rem; color: var(--primary-color);"></h2>
          </div>
          
          <label style="background-color: #9C27B0 !important; color: #ffffff !important; border-radius: 12px !important; padding: 1.5rem !important; display: flex !important; align-items: center !important; justify-content: center !important; gap: 10px !important; cursor: pointer !important; box-shadow: 0 4px 6px rgba(0,0,0,0.15) !important; flex-shrink: 0 !important; width: 100% !important; box-sizing: border-box !important;">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
              <span style="font-weight: bold !important; font-size: 1.4rem !important;">Scan Expiration Date</span>
              <input type="file" accept="image/*" capture="environment" id="camera-input" style="display:none;">
          </label>

          <hr style="border: 0; border-top: 2px dashed var(--card-border); width: 100%; opacity: 0.5;">

          <div style="text-align: center; flex-shrink: 0; width: 100%;">
              <p style="font-weight: bold; margin: 0 0 10px 0; opacity: 0.8; font-size: 1rem;">Not able to scan? Key in Expiration Date below:</p>
              <p id="manual-date-display" class="time-card-display" onclick="openDatePicker()" style="margin-bottom: 15px;">Tap to select date</p>
          </div>

      </div>

      <div class="step-footer">
          <button class="primary-btn" id="manual-check-btn">Check Date</button>
      </div>

  </main>

  <div id="processing-screen" class="processing-overlay" style="display: none;">
      <div class="processing-spinner">⏳</div>
      <h2 style="font-size: 2rem;">AI is checking...</h2>
  </div>

  <div id="obnoxious-good" class="obnoxious-overlay good" style="display: none;">
      <div class="giant-icon">✅</div>
      <h1>SAFE!</h1>
      <p>You can eat/use this.</p>
      <button class="obnoxious-btn" onclick="closeOverlay()">OKAY</button>
  </div>

  <div id="obnoxious-bad" class="obnoxious-overlay bad" style="display: none;">
      <div class="giant-icon">❌</div>
      <h1>EXPIRED!</h1>
      <p>DO NOT eat/use this!</p>
      <button class="obnoxious-btn" onclick="closeOverlay()">OKAY</button>
  </div>

  <div id="obnoxious-not-found" class="obnoxious-overlay" style="display: none; background-color: #FF9800; color: white;">
      <div class="giant-icon">❓</div>
      <h1 style="font-size: 3rem; margin-bottom: 0.5rem; text-transform: uppercase;">NOT FOUND</h1>
      <p style="font-size: 2.2rem; font-weight: bold; line-height: 1.2; margin: 0 0 3rem 0;">No Expiry Date found.<br>Take image again</p>
      <button class="obnoxious-btn" onclick="closeOverlay()">OKAY</button>
  </div>

  <script src="../js/core/config.js"></script>
  <script src="../js/core/app.js"></script>
  <script src="../js/utils/ui.js"></script>
  <script src="../js/utils/rolodex.js"></script>
  <script src="../js/pages/expiry.js"></script>
</body>
</html>
